server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # API is reached by the browser on host :9000 (see environment.docker.ts); nginx only serves the SPA.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
