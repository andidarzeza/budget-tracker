<create-form [loadingData]="loadingData()" [loadingMessage]="loadingMessage()" icon="savings" [entity]="entity"
    [editMode]="isEditMode" (close)="closeDialog($event)" (create)="add()">

    <form [formGroup]="formGroup" class="dialog-form">
        <div class="dialog-form__row">
            <cb-labeled-form-input class="dialog-form__field"
                label="Amount"
                type="number"
                [minErrorKey]="'Enter a positive amount.'"
                [control]="$any(formGroup.get('amount'))">
            </cb-labeled-form-input>

            <cb-select-input class="dialog-form__field"
                label="Currency"
                [control]="$any(formGroup.get('currency'))"
                [options]="currencies"
                [displayWith]="displayCurrency">
            </cb-select-input>
        </div>

        <mat-form-field appearance="outline" class="dialog-form__field dialog-form__textarea primary-text">
            <mat-label class="primary-text">Note</mat-label>
            <textarea matInput formControlName="description" placeholder="Optional note about this deposit…"></textarea>
        </mat-form-field>

        <p class="contribution-hint">
            <mat-icon class="contribution-hint__icon" aria-hidden="true">info</mat-icon>
            <span>This contribution will also be recorded as an expense under <strong>Savings</strong>, reducing your account balance.</span>
        </p>
    </form>
</create-form>
