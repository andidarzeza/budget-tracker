<div class="account-page">
  <mat-card class="account-card light-dashboard-card {{sharedService.theme}}-table">
    <div class="app-loading-overlay" [@inOutAnimation] *ngIf="showSpinner()" role="status" aria-live="polite">
      <span class="app-spinner" aria-hidden="true">
        <span class="app-spinner__track"></span>
        <span class="app-spinner__arc"></span>
      </span>
      <p class="app-loading-label">Loading profiles…</p>
    </div>

    <header class="account-header">
      <div class="account-avatar" aria-hidden="true">
        AD
      </div>
      <div class="account-header-content">
        <h2 class="account-title {{sharedService.theme}}-title">Select profile</h2>
        <p class="account-subtitle">Choose the account you want to manage and continue.</p>
      </div>
      <span class="account-count">{{profileCountLabel()}}</span>
    </header>

    <div class="account-list" *ngIf="accounts().length; else noAccounts" role="list">
      <button type="button" matRipple class="account-option" *ngFor="let account of accounts()" role="listitem"
        [disabled]="showSpinner()" (click)="selectAccount(account)">
        <span class="account-option-avatar" aria-hidden="true">
          {{getAccountInitials(account)}}
        </span>
        <span class="account-option-content">
          <span class="{{sharedService.theme}}-title account-name">
          {{getAccountLabel(account)}}
          </span>
          <span class="account-option-hint">Click to open this profile</span>
        </span>
        <span class="account-option-arrow" aria-hidden="true">→</span>
      </button>
    </div>

    <ng-template #noAccounts>
      <div class="account-empty {{sharedService.theme}}-title">
        No accounts found for this user.
      </div>
    </ng-template>
  </mat-card>
</div>
