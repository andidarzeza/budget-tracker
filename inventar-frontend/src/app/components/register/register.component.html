<div class="register-container">
    <section class="visual-panel">
        <img class="visual-image" src="assets/login-hero.svg" alt="Budget planning illustration">
    </section>

    <section class="form-panel">
        <mat-card class="form-container">
            <div class="app-loading-overlay" [@inOutAnimation] *ngIf="showSpinner()">
                <mat-spinner class="app-loading-spinner" diameter="46" strokeWidth="4"></mat-spinner>
                <p class="app-loading-label">Creating your account...</p>
            </div>

            <div class="form-header">
                <span class="form-header-badge">Budget Tracker</span>
                <h1>Create your account</h1>
                <p>Set up your profile to start tracking expenses and income.</p>
            </div>

            <form [formGroup]="registerGroup" autocomplete="off" class="register-form">
                <div class="name-row">
                    <cb-labeled-form-input class="full-width"
                        [inputId]="'register-first-name'"
                        [label]="'First Name'"
                        [placeholder]="'Enter first name'"
                        [control]="$any(registerGroup.get('firstName'))"
                        [type]="'text'">
                    </cb-labeled-form-input>

                    <cb-labeled-form-input class="full-width"
                        [inputId]="'register-last-name'"
                        [label]="'Last Name'"
                        [placeholder]="'Enter last name'"
                        [control]="$any(registerGroup.get('lastName'))"
                        [type]="'text'">
                    </cb-labeled-form-input>
                </div>

                <cb-labeled-form-input class="full-width"
                    [inputId]="'register-username'"
                    [label]="'Username'"
                    [placeholder]="'Choose username'"
                    [control]="$any(registerGroup.get('username'))"
                    [type]="'text'">
                </cb-labeled-form-input>

                <cb-labeled-form-input class="full-width password-field"
                    [inputId]="'register-password'"
                    [label]="'Password'"
                    [placeholder]="'Create password'"
                    [control]="$any(registerGroup.get('password'))"
                    [type]="'password'">
                </cb-labeled-form-input>

                <div class="actions">
                    <button [disabled]="showSpinner()" mat-raised-button color="primary" class="primary-action" (click)="login()">
                        Create account
                    </button>
                    <button [disabled]="showSpinner()" mat-stroked-button class="secondary-action" (click)="navigate('/login')">
                        Back to sign in
                    </button>
                </div>
                <div class="caps-lock" appCapsLock>
                    <span class="caps-lock-dot"></span> Caps lock is on.
                </div>
            </form>
        </mat-card>
    </section>
</div>
