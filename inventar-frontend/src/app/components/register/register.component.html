<div class="register-container">
    <section class="visual-panel" aria-hidden="true">
        <auth-visual></auth-visual>
    </section>

    <section class="form-panel">
        <mat-card class="form-container">
            <div class="app-loading-overlay" [@inOutAnimation] *ngIf="showSpinner()" role="status" aria-live="polite">
                <span class="app-spinner" aria-hidden="true">
                    <span class="app-spinner__track"></span>
                    <span class="app-spinner__arc"></span>
                </span>
                <p class="app-loading-label">Creating your account…</p>
            </div>

            <div class="form-header">
                <span class="form-header-badge">Financa</span>
                <h1>Create your account</h1>
                <p>Set up your profile to start tracking expenses and income.</p>
            </div>

            <form [formGroup]="registerGroup" autocomplete="off" class="register-form">
                <div class="name-row">
                    <cb-labeled-form-input class="full-width"
                        [inputId]="'register-first-name'"
                        [label]="'First Name'"
                        [placeholder]="'Enter first name'"
                        [icon]="'badge'"
                        [control]="$any(registerGroup.get('firstName'))"
                        [type]="'text'">
                    </cb-labeled-form-input>

                    <cb-labeled-form-input class="full-width"
                        [inputId]="'register-last-name'"
                        [label]="'Last Name'"
                        [placeholder]="'Enter last name'"
                        [icon]="'badge'"
                        [control]="$any(registerGroup.get('lastName'))"
                        [type]="'text'">
                    </cb-labeled-form-input>
                </div>

                <cb-labeled-form-input class="full-width username-field"
                    [inputId]="'register-username'"
                    [label]="'Username'"
                    [placeholder]="'Choose username'"
                    [icon]="'person'"
                    [control]="$any(registerGroup.get('username'))"
                    [type]="'text'">
                </cb-labeled-form-input>

                <cb-labeled-form-input class="full-width password-field"
                    [inputId]="'register-password'"
                    [label]="'Password'"
                    [placeholder]="'Create password'"
                    [icon]="'lock'"
                    [control]="$any(registerGroup.get('password'))"
                    [type]="'password'">
                </cb-labeled-form-input>

                <div class="actions">
                    <button type="button" [disabled]="showSpinner()" mat-stroked-button class="primary-action" (click)="login()">
                        Create account
                    </button>
                    <span class="divider-label">or</span>
                    <button type="button" [disabled]="showSpinner()" mat-stroked-button class="secondary-action" (click)="navigate('/login')">
                        Back to sign in
                    </button>
                </div>
            </form>
        </mat-card>
    </section>
</div>
