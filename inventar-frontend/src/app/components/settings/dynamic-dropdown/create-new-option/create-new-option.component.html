<div class="add-option-container">
    <div *ngIf="createMode || editMode" class="input-container" [@inAnimation]>
        <form [formGroup]="formGroup" class="input-width">
            <cb-labeled-form-input class="my-form-field w-full"
                label="Create new option"
                type="text"
                [control]="$any(formGroup.get('item'))">
            </cb-labeled-form-input>
        </form>

        <div class="action-container">
            <button mat-icon-button (click)="addItem()">
                <mat-icon>
                    check
                </mat-icon>
            </button>

            <button mat-icon-button (click)="cancel()">
                <mat-icon>
                    close
                </mat-icon>
            </button>
        </div>
    </div>

    <button *ngIf="!createMode && !editMode" [@inAnimation] mat-icon-button color="primary" (click)="create()">
        <mat-icon>
            add
        </mat-icon>
    </button>
</div>
