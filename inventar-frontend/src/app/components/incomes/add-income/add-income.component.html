<create-form [loadingData]="loadingData" icon="transit_enterexit" [entity]="entity" [editMode]="editMode" (close)="closeDialog($event)" (create)="add()">

    <form [formGroup]="formGroup" class="dialog-form">
        <div class="dialog-form__row">
            <mat-form-field appearance="outline" class="dialog-form__field primary-text">
                <mat-label class="primary-text">Income Category</mat-label>
                <mat-select formControlName="categoryID" class="primary-text">
                    <mat-option class="primary-text" *ngFor="let category of categories" [value]="category.id">
                        {{ category?.category }}
                    </mat-option>
                </mat-select>
                <mat-error *ngIf="category.errors?.required">This field is required.</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="dialog-form__field primary-text">
                <mat-label class="primary-text">Income</mat-label>
                <input type="number" autocomplete="off" matInput formControlName="incoming">
                <mat-error *ngIf="incomeValue.errors?.required">This field is required.</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="dialog-form__field primary-text">
                <mat-label class="primary-text">Currency</mat-label>
                <mat-select formControlName="currency" class="primary-text">
                    <mat-option class="primary-text" *ngFor="let currency of currencies" [value]="currency">
                        {{ currency | flag }} {{ currency }}
                    </mat-option>
                </mat-select>
                <mat-error>This field is required.</mat-error>
            </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="dialog-form__field dialog-form__textarea primary-text">
            <mat-label class="primary-text">Description</mat-label>
            <textarea matInput formControlName="description" placeholder="Write a note..."></textarea>
        </mat-form-field>
    </form>
</create-form>
