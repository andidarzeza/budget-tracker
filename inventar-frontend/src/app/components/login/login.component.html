<div class="login-container">
    <section class="visual-panel">
        <img class="visual-image" src="assets/login-hero.svg" alt="Budget overview illustration">
    </section>

    <section class="form-panel">
        <mat-card class="form-container">
            <mat-progress-bar class="progress-bar" mode="indeterminate" [@inOutAnimation] *ngIf="showSpinner()"></mat-progress-bar>

            <div class="form-header">
                <span class="form-header-badge">Budget Tracker</span>
                <h1>Welcome back</h1>
                <p>Sign in to continue to your dashboard and manage your finances.</p>
            </div>

            <form [formGroup]="loginGroup" autocomplete="off" class="login-form">
                <cb-labeled-form-input class="full-width"
                    [inputId]="'login-username'"
                    [label]="'Username'"
                    [placeholder]="'Enter username'"
                    [control]="$any(loginGroup.get('username'))"
                    [type]="'text'">
                </cb-labeled-form-input>

                <cb-labeled-form-input class="full-width password-field"
                    [inputId]="'login-password'"
                    [label]="'Password'"
                    [placeholder]="'Enter password'"
                    [control]="$any(loginGroup.get('password'))"
                    [type]="'password'">
                </cb-labeled-form-input>

                <div class="actions">
                    <button [disabled]="showSpinner()" class="primary-action" mat-raised-button color="primary" (click)="login()">
                        Sign in
                    </button>
                    <span class="divider-label">or</span>

                    <button [disabled]="showSpinner()" class="secondary-action" mat-raised-button color="primary"
                        (click)="navigate('/register')">
                        Create account
                    </button>

                </div>
                <div class="caps-lock" appCapsLock>
                    <span class="caps-lock-dot"></span> Caps lock is on.
                </div>
            </form>
        </mat-card>
    </section>
</div>
