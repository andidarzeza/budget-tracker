<div class="login-container">
    <section class="visual-panel" aria-hidden="true">
        <auth-visual></auth-visual>
    </section>

    <section class="form-panel">
        <mat-card class="form-container">
            <div class="app-loading-overlay" [@inOutAnimation] *ngIf="showSpinner()" role="status" aria-live="polite">
                <span class="app-spinner" aria-hidden="true">
                    <span class="app-spinner__track"></span>
                    <span class="app-spinner__arc"></span>
                </span>
                <p class="app-loading-label">Signing you in…</p>
            </div>

            <div class="form-header">
                <span class="form-header-badge">Financa</span>
                <h1>Welcome back</h1>
                <p>Sign in to continue to your dashboard and manage your finances.</p>
            </div>

            <form [formGroup]="loginGroup" autocomplete="off" class="login-form">
                <cb-labeled-form-input class="full-width"
                    [inputId]="'login-username'"
                    [label]="'Username'"
                    [placeholder]="'Enter username'"
                    [icon]="'person'"
                    [control]="$any(loginGroup.get('username'))"
                    [type]="'text'">
                </cb-labeled-form-input>

                <cb-labeled-form-input class="full-width password-field"
                    [inputId]="'login-password'"
                    [label]="'Password'"
                    [placeholder]="'Enter password'"
                    [icon]="'lock'"
                    [control]="$any(loginGroup.get('password'))"
                    [type]="'password'">
                </cb-labeled-form-input>

                <div class="actions">
                    <button type="button" [disabled]="showSpinner()" class="primary-action" mat-stroked-button (click)="login()">
                        Sign in
                    </button>
                    <span class="divider-label">or</span>

                    <button type="button" [disabled]="showSpinner()" class="secondary-action" mat-stroked-button
                        (click)="navigate('/register')">
                        Create account
                    </button>

                </div>
            </form>
        </mat-card>
    </section>
</div>
