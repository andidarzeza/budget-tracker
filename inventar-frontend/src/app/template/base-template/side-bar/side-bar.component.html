<div id="sidebar"
    [ngClass]="{
        'sidebar--mobile-drawer': mobileDrawer,
        'sidebar--mobile-drawer--open': mobileDrawer && (sideBarService.mobileMenuOpen$ | async)
    }"
    [ngStyle]="mobileDrawer ? {} : {'position': sideBarMode!='over' ? 'relative' : 'absolute', 'width': sideBarMode!='over' ? '250px' : '76px' }"
    class="sidebar grad"
    [style.height]="'100%'"
    [style.z-index]="mobileDrawer ? 13 : 2"
    *ngIf="authenticationService.currentUserValue">
    <div class="logo-container">
        <a routerLink="/dashboard" class="sidebar-brand"
            (click)="onBrandClick()"
            [matTooltip]="sideBarService.isOpened ? '' : 'Budget Tracker'"
            matTooltipPosition="below"
            aria-label="Budget Tracker — Home">
            <div class="sidebar-brand-mark">
                <div class="sidebar-brand-ring">
                    <div class="sidebar-brand-core"></div>
                </div>
            </div>
            <div *ngIf="sideBarService.isOpened" class="sidebar-brand-text">
                <span class="sidebar-brand-title">Budget</span>
                <span class="sidebar-brand-accent">Tracker</span>
            </div>
        </a>
    </div>

    <div class="menu-items">
        <div id="active-item"></div>
        <div 
            class="opened-menu-item pointer" 
            *ngFor="let item of navigation;let i = index" 
            [routerLink]="[item.link]" 
            routerLinkActive="router-link-active"
            (click)="onNavItemClick(i)"
            [matTooltip]="item.text"
            matTooltipPosition="below"
            matTooltipClass="sidebar-tooltip"
        >
            <mat-icon class="primary-icon sidebar-icon">{{item.icon}}</mat-icon>
            <span *ngIf="sideBarService.isOpened" class="title">{{item.text}}</span>
        </div>
    </div>

    <div *ngIf="!mobileDrawer" style="position: absolute; bottom: 30px;left: 50%;transform: translateX(-50%);">
        <button class="menu-item" mat-icon-button (click)="sideBarService.toggleSideBar()">
            <mat-icon class="primary-icon">
                compare_arrows
            </mat-icon>
        </button>
    </div>

</div>
