<div [@routeAnimations]="prepareRoute()" class="application-container">

    @if (authenticationService.currentUserValue && sideBarService.displaySidebar) {
        <side-bar [navigation]="navigation"
            [sideBarMode]="sideBarMode"
            [mobileDrawer]="(breakpointService.useTableCardLayout$ | async) === true"></side-bar>
    }

    <div class="application" id="application-body"
        style="position: relative;"
        [ngStyle]="{'margin-left': applicationLeftMargin }"
        [ngClass]="authenticationService.currentUserValue ? 'app-width' : 'app-full-width'">

        @if (sideBarMode === 'over') {
            <div class="shadow" id="shadow" (click)="toggleSidebar()"></div>
        }

        @if (navBarService.displayNavBar) {
            <nav-bar></nav-bar>
        }

        @if ((breakpointService.useTableCardLayout$ | async) && authenticationService.currentUserValue && sideBarService.displaySidebar) {
            <div class="mobile-nav-backdrop"
                [class.mobile-nav-backdrop--open]="(sideBarService.mobileMenuOpen$ | async) === true"
                (click)="sideBarService.closeMobileMenu()"
                aria-hidden="true"></div>
        }

        <div class="content-container" [class.content-container--public]="!authenticationService.currentUserValue">
            <ng-content></ng-content>
        </div>
    </div>
</div>
