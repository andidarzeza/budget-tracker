<div class="amount-keypad" role="group" aria-label="Number keypad">
  <div class="amount-keypad__grid">
    <button type="button" class="amount-keypad__key" (pointerdown)="onDigit('7'); $event.preventDefault()">7</button>
    <button type="button" class="amount-keypad__key" (pointerdown)="onDigit('8'); $event.preventDefault()">8</button>
    <button type="button" class="amount-keypad__key" (pointerdown)="onDigit('9'); $event.preventDefault()">9</button>
    <button type="button" class="amount-keypad__key" (pointerdown)="onDigit('4'); $event.preventDefault()">4</button>
    <button type="button" class="amount-keypad__key" (pointerdown)="onDigit('5'); $event.preventDefault()">5</button>
    <button type="button" class="amount-keypad__key" (pointerdown)="onDigit('6'); $event.preventDefault()">6</button>
    <button type="button" class="amount-keypad__key" (pointerdown)="onDigit('1'); $event.preventDefault()">1</button>
    <button type="button" class="amount-keypad__key" (pointerdown)="onDigit('2'); $event.preventDefault()">2</button>
    <button type="button" class="amount-keypad__key" (pointerdown)="onDigit('3'); $event.preventDefault()">3</button>
    <button type="button" class="amount-keypad__key amount-keypad__key--muted" (pointerdown)="onDecimal(); $event.preventDefault()">.</button>
    <button type="button" class="amount-keypad__key" (pointerdown)="onDigit('0'); $event.preventDefault()">0</button>
    <button type="button" class="amount-keypad__key amount-keypad__key--wide"
        (pointerdown)="onBackspacePressStart(); $event.preventDefault()"
        (pointerup)="stopBackspaceRepeat()"
        (pointercancel)="stopBackspaceRepeat()"
        (pointerleave)="stopBackspaceRepeat()"
        aria-label="Delete last digit">
      <mat-icon>backspace</mat-icon>
    </button>
  </div>
  <button type="button" class="amount-keypad__clear" (pointerdown)="onClear(); $event.preventDefault()">Clear</button>
</div>
