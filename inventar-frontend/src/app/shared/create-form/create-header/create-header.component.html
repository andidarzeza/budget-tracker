<header class="dialog-header">
    <div class="dialog-header-leading">
        <div class="dialog-header-icon" aria-hidden="true">
            <mat-icon>{{ icon }}</mat-icon>
        </div>
        <div class="dialog-header-text">
            <span class="dialog-header-eyebrow">{{ editMode ? 'Edit' : 'Create new' }}</span>
            <h2 class="dialog-header-title">{{ entity | titlecase }}</h2>
        </div>
    </div>
    <button type="button" mat-icon-button class="dialog-header-close" (click)="closeDialog(false)"
        aria-label="Close dialog">
        <mat-icon>close</mat-icon>
    </button>
</header>
