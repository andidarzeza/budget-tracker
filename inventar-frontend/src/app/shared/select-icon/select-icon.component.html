<div class="form-field">
    <label>{{ label }}</label>
    <button
        type="button"
        class="input-wrapper"
        [class.input-wrapper--placeholder]="!value"
        [disabled]="disabled"
        [attr.aria-haspopup]="'dialog'"
        [attr.aria-expanded]="showIconSelect()"
        (click)="open()"
    >
        @if (value) {
            <mat-icon class="input-icon">{{ value }}</mat-icon>
            <span class="input-value">{{ value }}</span>
        } @else {
            <mat-icon class="input-icon input-icon--muted">add_circle_outline</mat-icon>
            <span class="input-value input-value--placeholder">{{ placeholder }}</span>
        }
        <mat-icon class="input-chevron" aria-hidden="true">expand_more</mat-icon>
    </button>
</div>

@if (showIconSelect()) {
    <div class="icon-select-backdrop" [@fadeAnimation] (click)="close()"></div>

    <div [@panelAnimation] class="icon-select" role="dialog" aria-label="Select an icon">
        <header class="icon-select__header">
            <button type="button" cb-icon-button (click)="close()" aria-label="Back">
                <mat-icon>keyboard_arrow_left</mat-icon>
            </button>
            <h2 class="icon-select__title">Select an icon</h2>
        </header>

        <cb-labeled-form-input
            class="icon-select__search"
            label=""
            icon="search"
            placeholder="Search icons…"
            [control]="$any(searchControl)"
        ></cb-labeled-form-input>

        <mat-divider></mat-divider>

        @if (filteredIcons().length) {
            <div class="icons">
                @for (icon of filteredIcons(); track icon) {
                    <button
                        type="button"
                        class="icon"
                        [class.icon--selected]="value === icon"
                        (click)="select(icon)"
                        [attr.aria-label]="icon"
                    >
                        <mat-icon>{{ icon }}</mat-icon>
                        <span>{{ icon }}</span>
                    </button>
                }
            </div>
        } @else {
            <div class="icons-empty">
                <mat-icon class="icons-empty__icon">search_off</mat-icon>
                <p class="icons-empty__text">
                    No icons match "<strong>{{ query() }}</strong>"
                </p>
                <button type="button" class="icons-empty__clear" (click)="clearSearch()">
                    Clear search
                </button>
            </div>
        }
    </div>
}
