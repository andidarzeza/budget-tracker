<mat-form-field (click)="open()" class="primary-text icon-trigger" appearance="outline">
    <mat-label class="icon-trigger__label">
        <mat-icon class="selected-icon primary-text" *ngIf="value">
            {{value}}
        </mat-icon>
        <span class="primary-text icon-trigger__text">
            {{value ? value : 'Select Icon'}}
        </span>
    </mat-label>
    <input class="icon-trigger__input" readonly type="text" autocomplete="off" matInput>
    <mat-error>This field is required.</mat-error>
</mat-form-field>

<ng-container *ngIf="showIconSelect">
    <div class="icon-select-backdrop" [@fadeAnimation] (click)="close()"></div>

    <div [@panelAnimation] class="icon-select" role="dialog" aria-label="Select an icon">
        <div class="actions">
            <button mat-icon-button (click)="close()" aria-label="Back">
                <mat-icon class="actions__icon">keyboard_arrow_left</mat-icon>
            </button>
            <span class="actions__label" (click)="close()">Back</span>
        </div>

        <mat-divider></mat-divider>

        <div class="icons">
            <div *ngFor="let icon of icons"
                 class="icon"
                 [class.icon--selected]="value === icon"
                 (click)="select(icon)">
                <mat-icon>{{icon}}</mat-icon>
                <span>{{icon}}</span>
            </div>
        </div>
    </div>
</ng-container>
