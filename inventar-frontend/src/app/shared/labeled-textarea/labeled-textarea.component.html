<div class="form-field">
  <label [for]="inputId()">
    {{ label() }}
    @if (required) {
      *
    }
  </label>
  <div class="input-wrapper" [class.required-field]="displayError">
    <textarea
      [id]="inputId()"
      [rows]="rows()"
      [placeholder]="placeholder()"
      [formControl]="control()"
    ></textarea>
  </div>
</div>
