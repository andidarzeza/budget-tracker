<div class="record-actions-container">
    <div class="record-actions-inner">
        <button type="button" *ngIf="displayViewAction" cb-icon-button size="sm"
            matTooltip="View" matTooltipPosition="below" matTooltipClass="sidebar-tooltip"
            (click)="emitViewAction($event)" aria-label="View">
            <mat-icon>open_in_new</mat-icon>
        </button>
        <button type="button" *ngIf="displayEditAction" cb-icon-button size="sm"
            matTooltip="Edit" matTooltipPosition="below" matTooltipClass="sidebar-tooltip"
            (click)="emitEditAction($event)" aria-label="Edit">
            <mat-icon>edit</mat-icon>
        </button>
        <button type="button" *ngIf="displayDeleteAction" cb-icon-button variant="danger" size="sm"
            matTooltip="Delete" matTooltipPosition="below" matTooltipClass="sidebar-tooltip"
            (click)="emitDeleteAction($event)" aria-label="Delete">
            <mat-icon>delete</mat-icon>
        </button>
    </div>
</div>
