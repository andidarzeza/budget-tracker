<ng-container *ngIf="{ mobile: (breakpointService.useTableCardLayout$ | async) === true } as layout">
    <!-- Desktop: bordered table shell + paginator -->
    <div *ngIf="!layout.mobile" class="base-table-container">
        <div class="app-loading-overlay" [@inOutAnimation] *ngIf="loading" role="status" aria-live="polite">
            <span class="app-spinner" aria-hidden="true">
                <span class="app-spinner__track"></span>
                <span class="app-spinner__arc"></span>
            </span>
            <p class="app-loading-label">Loading data…</p>
        </div>

        <table-actions [filterOptions]="filterOptions" [tableActionInput]="tableActionInput"
            [hideEmbeddedTitle]="false"
            (onOpenDialog)="onOpenDialog.emit()" (onRefresh)="onRefresh.emit()" (onSearch)="onSearch.emit($event)"
            (onReset)="onReset.emit()">
        </table-actions>

        <div class="base-table-scroll-area">
            <div class="table-closed">
                <table-header [columnDefinitions]="columnDefinition"></table-header>
                <table-body [displayEditAction]="displayEditAction"
                    [displayDeleteAction]="displayDeleteAction" [data]="data"
                    [columnDefinitions]="columnDefinition" [infiniteScrollEnabled]="false"
                    (onDeleteConfirmation)="onDeleteConfirmation.emit($event)"
                    (onAddEditForm)="onAddEditForm.emit($event)" (onViewDetails)="viewDetails($event)"></table-body>

                <mat-paginator class="base-table-paginator" [length]="total"
                    [pageSize]="pageSize" [showFirstLastButtons]="true"
                    [pageSizeOptions]="[]"
                    [hidePageSize]="breakpointService.screenSize == 'mobile'"
                    [pageIndex]="pageIndex" (page)="handlePageEvent($event)">
                </mat-paginator>
                <table-message [total]="data?.length"></table-message>
            </div>
        </div>
    </div>

    <!-- Mobile: title + actions one row (shared inset), then cards -->
    <div *ngIf="layout.mobile" class="base-table-mobile">
        <div class="mobile-page-toolbar-row">
            <header class="mobile-page-head" *ngIf="tableActionInput">
                <mat-icon class="mobile-page-head-icon" aria-hidden="true">{{ tableActionInput.icon }}</mat-icon>
                <h1 class="mobile-page-title">{{ tableActionInput.pageName }}</h1>
            </header>
            <table-actions [filterOptions]="filterOptions" [tableActionInput]="tableActionInput"
                [hideEmbeddedTitle]="true"
                [mobileToolbar]="true"
                (onOpenDialog)="onOpenDialog.emit()" (onRefresh)="onRefresh.emit()" (onSearch)="onSearch.emit($event)"
                (onReset)="onReset.emit()">
            </table-actions>
        </div>
        <div class="mobile-cards-viewport">
            <div class="app-loading-overlay" [@inOutAnimation] *ngIf="loading" role="status" aria-live="polite">
                <span class="app-spinner app-spinner--sm" aria-hidden="true">
                    <span class="app-spinner__track"></span>
                    <span class="app-spinner__arc"></span>
                </span>
                <p class="app-loading-label">Loading data…</p>
            </div>
            <table-body [displayEditAction]="displayEditAction"
                [displayDeleteAction]="displayDeleteAction" [data]="data"
                [columnDefinitions]="columnDefinition"
                [infiniteScrollEnabled]="true"
                [hasMore]="hasMoreData"
                [loadingMore]="loadingMore"
                (loadMore)="emitLoadMore()"
                (onDeleteConfirmation)="onDeleteConfirmation.emit($event)"
                (onAddEditForm)="onAddEditForm.emit($event)" (onViewDetails)="viewDetails($event)"></table-body>
            <table-message [total]="data?.length"></table-message>
        </div>
    </div>
</ng-container>
