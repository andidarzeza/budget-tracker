<section class="filter-panel" @panelIn>
    <header class="filter-panel__head">
        <div class="filter-panel__title">
            <mat-icon class="filter-panel__title-icon" aria-hidden="true">filter_list</mat-icon>
            <span class="filter-panel__title-text">Filters</span>
            @if (appliedCount() > 0) {
                <span class="filter-panel__badge" aria-label="Active filter count">
                    {{ appliedCount() }} active
                </span>
            }
        </div>
        <button
            type="button"
            cb-icon-button
            (click)="close()"
            aria-label="Close filters"
        >
            <mat-icon>close</mat-icon>
        </button>
    </header>

    <form [formGroup]="formGroup" class="filter-panel__form" (keydown.enter)="onEnter()">
        @for (filterOption of filterOptions; track filterOption.field) {
            <div class="filter-panel__cell">
                @switch (filterOption.type) {
                    @case ('text') {
                        <cb-labeled-form-input
                            [label]="filterOption.label"
                            type="text"
                            [control]="$any(formGroup.get(filterOption.field))"
                        ></cb-labeled-form-input>
                    }
                    @case ('number') {
                        <cb-labeled-form-input
                            [label]="filterOption.label"
                            type="number"
                            [control]="$any(formGroup.get(filterOption.field))"
                        ></cb-labeled-form-input>
                    }
                    @case ('select') {
                        <cb-select-input
                            [label]="filterOption.label"
                            [control]="$any(formGroup.get(filterOption.field))"
                            [options]="filterOption?.matSelectOptions?.options || []"
                            [displayWith]="$any(displayBy(filterOption))"
                            [valueWith]="$any(valueBy(filterOption))"
                        ></cb-select-input>
                    }
                }
            </div>
        }
    </form>

    <footer class="filter-panel__actions">
        <button
            type="button"
            class="filter-panel__btn filter-panel__btn--ghost"
            (click)="clear()"
            [disabled]="!hasFormValues()"
        >
            <mat-icon>refresh</mat-icon>
            <span>Reset</span>
        </button>
        <button
            type="button"
            class="filter-panel__btn filter-panel__btn--primary"
            (click)="apply()"
            [disabled]="!dirty()"
        >
            <mat-icon>search</mat-icon>
            <span>Apply</span>
        </button>
    </footer>
</section>
