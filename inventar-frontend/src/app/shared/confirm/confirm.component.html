<div class="confirm-dialog">
    <header class="confirm-dialog-header">
        <div class="confirm-dialog-header-text">
            <h2 class="confirm-dialog-title">Delete item?</h2>
            <p class="confirm-dialog-subtitle">This action cannot be undone.</p>
        </div>
        <button type="button" mat-icon-button class="confirm-dialog-close" (click)="closeDialog()"
            aria-label="Close">
            <mat-icon>close</mat-icon>
        </button>
    </header>

    <div class="confirm-dialog-body">
        <p class="confirm-dialog-message">
            Are you sure you want to delete this item? All related data will be permanently removed.
        </p>
    </div>

    <footer class="confirm-dialog-footer">
        <button type="button" cb-pill-button icon="close" (click)="closeDialog()">
            Cancel
        </button>
        <button type="button" cb-pill-button variant="danger" icon="delete" (click)="confirm()">
            Delete
        </button>
    </footer>
</div>
