# Budget tracker: MongoDB + Spring Boot API + Angular (nginx) on one host.
# Default host ports: web (SPA + /api proxy) → 4001, backend (direct API) → 9000.
# Override with HTTP_PORT / BACKEND_PORT in .env if those ports are taken.
#
# Copy .env.example → .env and adjust before first start.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: inventar
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  backend:
    build:
      context: ./inventar-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:-mongodb://mongo:27017/inventar?connectTimeoutMS=10000&serverSelectionTimeoutMS=10000&socketTimeoutMS=30000}
      # Set CORS_ORIGIN only in .env (not here). Using CORS_ORIGIN: ${CORS_ORIGIN:-} forces an empty value and breaks CORS.
    ports:
      - "${BACKEND_PORT:-9000}:9000"

  web:
    build:
      context: ./inventar-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-4001}:80"

volumes:
  mongo_data:
